<div class="min-h-screen bg-gray-100 py-8">
  <div class="container mx-auto px-4">

    <!-- Header -->
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-gray-800">User Reports</h2>
      <p class="text-gray-500 text-sm">View and manage user reports</p>
    </div>

    <!-- Reports Grid -->
    <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">

      <!-- @for (user of users(); track $index) { -->
        <div class="bg-white rounded-2xl shadow-md border p-5 hover:shadow-xl transition">

          <!-- Top -->
          <div class="flex items-center gap-3 mb-4">
            <div class="w-12 h-12 bg-purple-500 text-white flex items-center justify-center rounded-full font-bold">
              <!-- {{ user.email[]?.toUpperCase() }} -->
            </div>
            <div>
              <p class="font-semibold text-gray-800">#{{ email }}</p>
              <p class="text-xs text-gray-500">{{id}}</p>
            </div>
          </div>

          <!-- Email -->
          <p class="text-sm text-gray-600 mb-2">
            <!-- {{ user.email }} -->
          </p>

          <!-- Report -->
          <div class="bg-gray-50 p-3 rounded-lg mb-4 border">
            <p class="text-sm text-gray-700 whitespace-pre-wrap">
              {{ report || 'No report submitted' }}
            </p>
          </div>

          <div class="flex justify-between items-center mb-3">
            <span class="text-xs px-2 py-1 rounded-full bg-blue-100 text-blue-600">
              {{  report ? 'Ai profilier analysis' : 'No Report' }}
            </span>
          </div>

          <!-- Actions -->
          
        </div>
    

    </div>
  </div>
</div>
