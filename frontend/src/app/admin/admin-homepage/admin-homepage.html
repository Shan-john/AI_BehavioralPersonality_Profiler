<div class="min-h-screen bg-gray-100 py-8">
  <div class="container mx-auto px-4">

    <!-- Header -->
    <div class="mb-6 flex justify-between items-center">
      <div>
        <h2 class="text-2xl font-bold text-gray-800">Users Dashboard</h2>
        <p class="text-gray-500 text-sm">Manage all registered users</p>
      </div>
      <button 
        (click)="logout()"
        class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-red-600 transition shadow-md">
        Logout
      </button>
    </div>

    <!-- Main Card -->
    <div class="bg-white rounded-2xl shadow-lg border">

      <!-- Card Header -->
      <div class="flex justify-between items-center px-6 py-4 border-b">
        <h3 class="text-lg font-semibold text-gray-700">All Users</h3>
        <span class="text-sm bg-blue-100 text-blue-600 px-3 py-1 rounded-full">
          {{ users().length }} Users
        </span>
      </div>

      <!-- Card Body -->
      <div class="p-6">

        <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">

          @for (user of users(); track $index) {
            <div (click)="openReport(user.report,user.email,user.id.toString())" class="bg-gradient-to-br from-white to-gray-50 rounded-2xl p-5 border shadow-sm hover:shadow-xl transition duration-300">
              <!-- Top Section -->
              <div class="flex items-center gap-3 mb-4">
                <!-- Avatar -->
                <div class="w-12 h-12 bg-blue-500 text-white flex items-center justify-center rounded-full text-lg font-bold shadow">
                  {{ user.email[0]?.toUpperCase() }}
                </div>
                <!-- Info -->
                <div>
                  <p class="text-xs text-gray-500">User ID</p>
                  <p class="font-semibold text-gray-800">#{{ user.id }}</p>
                </div>
              </div>
              <!-- Email -->
              <p class="text-gray-700 text-sm break-words mb-4">
                {{ user.email }}
              </p>
            </div>
          } @empty {
            <div class="col-span-full py-20 text-center">
              <p class="text-gray-400 text-lg">No users found.</p>
              <p class="text-gray-500 text-sm mt-2">Try refreshing the page or checking your internet connection.</p>
            </div>
          }

        </div>

      </div>
    </div>

  </div>
</div>
