<div class="h-screen w-full bg-[#f8f9fc] flex flex-col items-center justify-center overflow-hidden relative">
  <!-- Background Glows -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-indigo-100/50 rounded-full"></div>
  <div class="absolute top-1/4 left-1/4 w-[300px] h-[300px] bg-indigo-200/30 rounded-full animate-pulse"></div>

  <!-- Content Container -->
  <div class="relative z-10 flex flex-col items-center space-y-8 animate-in fade-in zoom-in duration-1000">
    <!-- Animated Logo Wrapper -->
    <div class="relative">
      <div class="absolute inset-0 bg-indigo-400 blur-2xl opacity-10 animate-pulse"></div>
      <img [src]="logo" alt="AI Profiler Logo" 
           class="h-48 w-48 object-cover rounded-3xl border border-slate-200 shadow-lg transition-transform duration-700 hover:scale-105">
    </div>

    <!-- Branding -->
    <div class="text-center space-y-2">
      <h1 class="text-5xl font-black tracking-tighter text-slate-800">
        AI <span class="text-indigo-600">PROFILER</span>
      </h1>
      <p class="text-slate-400 font-medium tracking-widest text-xs uppercase animate-pulse">
        Analyzing Behavioral Patterns
      </p>
    </div>

    <!-- Progress Indicator -->
    <div class="w-64 h-1.5 bg-slate-200 rounded-full overflow-hidden border border-slate-100">
      <div class="h-full bg-indigo-500 shadow-[0_0_15px_rgba(99,102,241,0.3)] animate-progress-loading"></div>
    </div>
  </div>

  <!-- Footer Branding -->
  <div class="absolute bottom-10 text-slate-400 text-[10px] font-bold tracking-[0.2em] uppercase">
    Powered by Advanced Intelligence
  </div>
</div>

<style>
  @keyframes progress-loading {
    0% { width: 0%; }
    100% { width: 100%; }
  }
  .animate-progress-loading {
    animation: progress-loading 5s linear forwards;
  }
</style>
