<div class="h-screen flex flex-col items-center">
  <header class="flex justify-center items-center gap-2.5 m-2.5">
    <img class="h-12" src="{{ logo }}" alt="" />

    <p class="text-2xl">Personality Test - <span class="font-bold">AI Profiler</span></p>
  </header>
  <hr class="w-full border-gray-300" />

  <div class="flex flex-col items-start justify-center h-fit w-2/4 mt-10">
    <div class="flex justify-between w-full">
      <p class="text-1xl">Step 4 of 10</p>
      <p class="text-1xl">{{ progress }}%</p>
    </div>
    <!-- progress bar -->
    <div class="w-full bg-blue-200 rounded-full h-4 shadow-inner mt-2.5">
      <div
        class="h-full rounded-full transition-all duration-500 bg-linear-to-r from-red-400 to-blue-700"
        [style.width.%]="progress"
      ></div>
    </div>
    <!-- progress bar -->
    <div class="mt-10">
      <h3 class="text-3xl font-medium">
        Describe your typical behavior in a dsfdsfjkhdsjkfhdsjkfkj fjsdh fjkhds fkjs dfjk sdjkfh dskjfh ksjdfh jksdhfjkdshfjkhdsfkj hsdkfjh dsjkfh dsjfh jksdhf ksdhfjkdshteam setting (question 4/10)
      </h3>
      <div class="mt-10 border-2 border-blue-500 rounded-2xl  ">
        <textarea name="" id="" cols="30" rows="10" class="outline-none w-full p-2 " placeholder="type your response here ..."></textarea>
      </div>
    </div>
    <div class=" flex justify-end mt-10 w-full">
      
      <button class="border-2 border-blue-700 text-blue px-4 py-2 rounded-[10px] w-[100px] hover:bg-blue-700 hover:text-white">Next</button>
    </div>
  </div>
</div>
